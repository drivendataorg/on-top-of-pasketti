program: src/run_pipeline.py
entity: speech-phonetic-track
project: wavlm_base_final_runs

method: random
metric:
  goal: minimize
  name: cv/mean_val_per

parameters:

#LR's:
  training.backbone_lr:
    distribution: log_uniform_values
    max: 5e-5
    min: 2e-5
  training.head_lr:
    distribution: log_uniform_values
    max: 5e-4
    min: 1e-4
  training.weight_decay:
    distribution: log_uniform_values
    max: 1e-4
    min: 1e-5
  loss.gamma:
    distribution: uniform
    max: 0.6
    min: 0.1
  training.max_grad_norm:
    value: 10
  model.classifier_dropout:
    distribution: uniform
    max: 0.2
    min: 0.05
  model.enable_age_head:
    values: [true]
  augmentation.time_stretch.p:
    distribution: uniform
    max: 0.5
    min: 0.0
  augmentation.pitch_shift.p:
    distribution: uniform
    max: 0.9
    min: 0.6
  scheduler.head.phase_ratio:
    value: "[0.01, 0.32, 0.679]"
  scheduler.backbone.phase_ratio:
    value: "[0.05, 0.3, 0.695]"
    
  model.pretrained_name:
    values: ["microsoft/wavlm-base-plus"]
  training.num_epochs:
    value: 20


command:
  - uv
  - run
  - ${program}
  - --config-name
  - default
  - ${args_no_hyphens}
