program: src/run_pipeline.py
entity: speech-phonetic-track
project: wavlm_base_sweep

method: random
metric:
  goal: minimize
  name: cv/mean_val_per

parameters:

#LR's:
  training.backbone_lr:
    distribution: log_uniform_values
    max: 1e-4
    min: 1e-6
  training.head_lr:
    distribution: log_uniform_values
    max: 1e-4
    min: 1e-6
#augmentation:
#freeze_backbone_epochs:
  model.pretrained_name:
    values: ["microsoft/wavlm-base", "microsoft/wavlm-base-plus"]
  model.use_lora:
    values: [true, false]
  model.LLA:
    values: [true, false]


command:
  - uv
  - run
  - ${program}
  - --config-name
  - default
  - ${args_no_hyphens}
